<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eQro PDF Hub Ultimate</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Roboto',sans-serif;background:#e8f5e9;}
header{background:#2e7d32;color:white;text-align:center;padding:20px;font-size:28px;font-weight:bold;}
nav{display:flex;justify-content:center;background:#1b5e20;flex-wrap:wrap;}
nav button{background:none;border:none;color:white;padding:12px 25px;cursor:pointer;font-size:16px;margin:2px;}
nav button:hover{background:#43a047;border-radius:5px;}
.search{width:90%;max-width:500px;display:block;margin:20px auto;padding:10px;border-radius:6px;border:1px solid #ccc;}
.page{display:none;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 3px 12px rgba(0,0,0,0.15);transition:0.3s;position:relative;}
.card:hover{transform:translateY(-5px);box-shadow:0 6px 20px rgba(0,0,0,0.25);}
.card iframe,.card video,.card img{width:100%;border-radius:5px;height:200px;object-fit:cover;}
.actions{display:flex;justify-content:space-between;margin-top:10px;}
.actions button{border:none;padding:6px 10px;border-radius:5px;cursor:pointer;}
.download{background:#2e7d32;color:white;}
.like{background:#ffeb3b;}
.messenger{position:absolute;top:10px;right:10px;background:#0084ff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.messenger img{width:14px;}
.uploadBtn{background:#43a047;color:white;border:none;padding:10px;width:100%;margin-top:5px;cursor:pointer;}
input,select{width:100%;padding:8px;margin:5px 0;}
</style>
</head>
<body>

<header>eQro PDF Hub</header>

<nav>
<button onclick="showPage('pdf')">PDF Hub</button>
<button onclick="showPage('video')">EduVid</button>
<button onclick="showPage('shop')">Shop</button>
<button onclick="adminLogin()">Admin</button>
</nav>

<input class="search" placeholder="Search..." onkeyup="searchItem(this.value)">

<div id="pdf" class="page"><div id="pdfList" class="grid"></div></div>
<div id="video" class="page"><div id="videoList" class="grid"></div></div>
<div id="shop" class="page"><div id="productList" class="grid"></div></div>

<div id="upload" class="page">
<h3>Upload PDF</h3>
<input type="file" id="pdfFile">
<input id="pdfName" placeholder="PDF name">
<select id="pdfCategory">
<option>Academic</option><option>Job</option><option>Admission</option><option>Others</option>
</select>
<button class="uploadBtn" onclick="uploadPDF()">Upload</button>

<h3>Upload Video</h3>
<input type="file" id="videoFile">
<input id="videoName" placeholder="Video name">
<button class="uploadBtn" onclick="uploadVideo()">Upload</button>

<h3>Upload Product</h3>
<input type="file" id="productFile">
<input id="productName" placeholder="Product name">
<input id="productPrice" placeholder="Price">
<button class="uploadBtn" onclick="uploadProduct()">Upload</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase connect
const SUPABASE_URL="https://uvzfyslttbqchrhetqdk.supabase.co";
const SUPABASE_KEY="sb_publishable_4x7wUqvQRxbIXysVhyBkJg_rHSYpJNo";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// Messenger ID space-safe
var messengerID="EQro%20Sit";

// Page switch
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

// Admin login
function adminLogin(){
  let pass=prompt("Enter Admin Password");
  if(pass==="eqro123"){showPage("upload");}
  else{alert("Wrong Password");}
}

// Card functions
function addPDFCard(name,url){
  const html=`<div class="card">
    <div class="messenger" onclick="window.open('https://m.me/${messengerID}','_blank')">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-messenger.png">
    </div>
    <h3>${name}</h3>
    <iframe src="${url}"></iframe>
    <div class="actions">
      <button class="download" onclick="window.open('${url}')">Download</button>
      <button class="like" onclick="like(this)">⭐ Like</button>
    </div>
  </div>`;
  document.getElementById("pdfList").innerHTML+=html;
}

function addVideoCard(name,url){
  const html=`<div class="card">
    <div class="messenger" onclick="window.open('https://m.me/${messengerID}','_blank')">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-messenger.png">
    </div>
    <h3>${name}</h3>
    <video controls src="${url}"></video>
    <div class="actions">
      <button class="download" onclick="window.open('${url}')">Download</button>
      <button class="like" onclick="like(this)">⭐ Like</button>
    </div>
  </div>`;
  document.getElementById("videoList").innerHTML+=html;
}

function addProductCard(name,price,url){
  const html=`<div class="card">
    <div class="messenger" onclick="window.open('https://m.me/${messengerID}','_blank')">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-messenger.png">
    </div>
    <img src="${url}">
    <h3>${name}</h3><p>Price: ${price}</p>
    <div class="actions">
      <button class="like" onclick="like(this)">⭐ Like</button>
    </div>
  </div>`;
  document.getElementById("productList").innerHTML+=html;
}

function like(btn){btn.innerHTML="⭐ Liked";}

// Search
function searchItem(text){
  text=text.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display=card.innerText.toLowerCase().includes(text)?"block":"none";
  });
}

// Upload functions (bucket: eQro.sit)
async function uploadPDF(){
  const file=document.getElementById("pdfFile").files[0];
  if(!file){alert("Select PDF");return;}
  const name=document.getElementById("pdfName").value||file.name;
  const path="pdfs/"+Date.now()+"_"+file.name;
  await supabaseClient.storage.from("eQro.sit").upload(path,file);
  const url=supabaseClient.storage.from("eQro.sit").getPublicUrl(path).data.publicUrl;
  await supabaseClient.from("pdfs").insert([{name,url}]);
  addPDFCard(name,url);
  document.getElementById("pdfFile").value="";document.getElementById("pdfName").value="";
}

async function uploadVideo(){
  const file=document.getElementById("videoFile").files[0];
  if(!file){alert("Select Video");return;}
  const name=document.getElementById("videoName").value||file.name;
  const path="videos/"+Date.now()+"_"+file.name;
  await supabaseClient.storage.from("eQro.sit").upload(path,file);
  const url=supabaseClient.storage.from("eQro.sit").getPublicUrl(path).data.publicUrl;
  await supabaseClient.from("videos").insert([{name,url}]);
  addVideoCard(name,url);
  document.getElementById("videoFile").value="";document.getElementById("videoName").value="";
}

async function uploadProduct(){
  const file=document.getElementById("productFile").files[0];
  const name=document.getElementById("productName").value;
  const price=document.getElementById("productPrice").value;
  if(!file||!name||!price){alert("Fill all fields");return;}
  const path="products/"+Date.now()+"_"+file.name;
  await supabaseClient.storage.from("eQro.sit").upload(path,file);
  const url=supabaseClient.storage.from("eQro.sit").getPublicUrl(path).data.publicUrl;
  await supabaseClient.from("products").insert([{name,price,url}]);
  addProductCard(name,price,url);
  document.getElementById("productFile").value="";document.getElementById("productName").value="";document.getElementById("productPrice").value="";
}

// Load all cards
async function loadData(){
  let {data:pdfs}=await supabaseClient.from("pdfs").select("*");
  pdfs?.forEach(p=>addPDFCard(p.name,p.url));
  let {data:videos}=await supabaseClient.from("videos").select("*");
  videos?.forEach(v=>addVideoCard(v.name,v.url));
  let {data:products}=await supabaseClient.from("products").select("*");
  products?.forEach(pr=>addProductCard(pr.name,pr.price,pr.url));
}

loadData();
showPage("pdf");
</script>
</body>
</html>
