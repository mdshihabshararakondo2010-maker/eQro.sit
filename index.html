<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eQro PDF Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Roboto',sans-serif;
  background:#e8f5e9;
}

header {
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
}

nav {
  display:flex;
  justify-content:center;
  background:#1b5e20;
  flex-wrap:wrap;
}

nav button {
  background:none;
  border:none;
  color:white;
  padding:12px 25px;
  cursor:pointer;
  font-size:16px;
  margin:2px;
}

nav button:hover {
  background:#43a047;
  border-radius:5px;
}

.page {
  display:none;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 3px 12px rgba(0,0,0,0.15);
  transition:0.3s;
  display:flex;
  flex-direction:column;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

.card iframe, .card video, .card img {
  width:100%;
  border-radius:5px;
  height:200px;
  object-fit:cover;
}

.card h3 {
  margin:10px 0 5px 0;
  font-size:18px;
}

.card p {
  margin:5px 0;
  font-size:14px;
}

.card .info {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
}

.card button.messenger {
  width:35px;
  height:35px;
  padding:0;
  border-radius:5px;
  background:#2e7d32;
  border:none;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.card button.messenger img {
  width:18px;
  height:18px;
}

.card .date {
  font-size:12px;
  color:#555;
}
</style>
</head>
<body>

<header>eQro PDF Hub</header>

<nav>
<button onclick="showPage('pdf')">Q PDF Hub</button>
<button onclick="showPage('video')">EduVid</button>
<button onclick="showPage('shop')">Q Shop</button>
</nav>

<!-- PDF PAGE -->
<div id="pdf" class="page">
<h2>Q PDF Hub</h2>
<div id="pdfList" class="grid"></div>
</div>

<!-- VIDEO PAGE -->
<div id="video" class="page">
<h2>EduVid</h2>
<div id="videoList" class="grid"></div>
</div>

<!-- SHOP PAGE -->
<div id="shop" class="page">
<h2>Q Shop</h2>
<div id="productList" class="grid"></div>
</div>

<script>
// Page switcher
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

// Messenger ID
var messengerID="EQro sit";

// Function to add PDF card
function addPDFCard(name,url){
  const date = new Date().toLocaleDateString();
  const html = `<div class="card">
    <h3>${name}</h3>
    <iframe src="${url}"></iframe>
    <div class="info">
      <span class="date">${date}</span>
      <button class="messenger" onclick="window.open('https://m.me/${messengerID}','_blank')">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-messenger.png" alt="Messenger">
      </button>
    </div>
  </div>`;
  document.getElementById("pdfList").innerHTML += html;
}

// Function to add Video card
function addVideoCard(name,url){
  const date = new Date().toLocaleDateString();
  const html = `<div class="card">
    <h3>${name}</h3>
    <video controls src="${url}"></video>
    <div class="info">
      <span class="date">${date}</span>
      <button class="messenger" onclick="window.open('https://m.me/${messengerID}','_blank')">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-messenger.png" alt="Messenger">
      </button>
    </div>
  </div>`;
  document.getElementById("videoList").innerHTML += html;
}

// Function to add Product card
function addProductCard(name,price,url){
  const date = new Date().toLocaleDateString();
  const html = `<div class="card">
    <img src="${url}" alt="${name}">
    <h3>${name}</h3>
    <p>Price: ${price}</p>
    <div class="info">
      <span class="date">${date}</span>
      <button class="messenger" onclick="window.open('https://m.me/${messengerID}','_blank')">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-messenger.png" alt="Messenger">
      </button>
    </div>
  </div>`;
  document.getElementById("productList").innerHTML += html;
}

// Demo content
addPDFCard("Sample PDF","sample.pdf");
addVideoCard("Sample Video","sample_video.mp4");
addProductCard("Sample Product","$10","https://via.placeholder.com/300");

// Default page
showPage('pdf');
</script>
</body>
</html>
