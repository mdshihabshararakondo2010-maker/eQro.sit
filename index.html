<!DOCTYPE html>
<html>
<head>
<title>eQro.sit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js" defer></script>
</head>
<body>

<header>eQro.sit</header>

<nav>
<button onclick="openPage('pdf')">Q PDF Hub</button>
<button onclick="openPage('video')">EduVid</button>
<button onclick="openPage('shop')">Q Shop</button>
<button onclick="openPage('admin')">Admin Panel</button>
</nav>

<!-- PDF HUB -->
<div id="pdf" class="page">
<h2>Q PDF Hub</h2>
<div class="grid" id="pdf-list"></div>
</div>

<!-- VIDEO SECTION -->
<div id="video" class="page">
<h2>EduVid</h2>
<div id="video-list" class="grid"></div>
</div>

<!-- SHOP SECTION -->
<div id="shop" class="page">
<h2>Q Shop</h2>
<div id="shop-list" class="grid"></div>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="page">
<h2>Admin Panel</h2>

<h3>Upload PDF</h3>
<input type="file" id="pdf-file">
<input type="text" id="pdf-category" placeholder="Category (Academic/Job/Admission/Others)">
<button onclick="uploadPDF()">Upload PDF</button>

<h3>Upload Video</h3>
<input type="file" id="video-file">
<button onclick="uploadVideo()">Upload Video</button>

<h3>Add Product</h3>
<input type="text" id="product-name" placeholder="Product Name">
<input type="text" id="product-price" placeholder="Price">
<input type="file" id="product-file">
<button onclick="uploadProduct()">Add Product</button>
</div>

</body>
</html>
