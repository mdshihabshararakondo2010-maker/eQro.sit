<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eQro.sit</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<style>
body {margin:0;font-family:'Open Sans',sans-serif;background:#f9f9f9;}
header{display:flex;align-items:center;justify-content:center;background:#0d47a1;color:white;font-size:28px;font-weight:700;padding:15px;font-family:'Roboto',sans-serif;}
header img{width:35px;margin-right:10px;}
nav{display:flex;justify-content:center;background:#222;}
nav button{background:none;border:none;color:white;padding:12px 18px;cursor:pointer;font-size:16px;font-family:'Roboto',sans-serif;}
nav button:hover{background:#1976d2;}
.page{display:none;min-height:calc(100vh - 100px);padding:20px;}
#pdf{background:#d0f0c0;}
#video{background:#fff9c4;}
#shop{background:#f5f5f5;}
#admin{background:#bbdefb;}
.grid{display:grid;grid-template-columns:1fr;gap:15px;}
@media(min-width:600px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:900px){.grid{grid-template-columns:repeat(3,1fr);}}
.card{background:white;border-radius:10px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,0.2);transition:transform 0.3s,box-shadow 0.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 5px 15px rgba(0,0,0,0.3);}
.card img, video{width:100%;border-radius:5px;}
.card h3{margin:5px 0;font-family:'Roboto',sans-serif;}
.card p{margin:5px 0;}
.card button{background:#1976d2;color:white;border:none;padding:8px 12px;border-radius:4px;cursor:pointer;margin-top:5px;display:flex;align-items:center;justify-content:center;}
.card button:hover{background:#0d47a1;}
.card button img{width:20px;height:20px;margin-right:8px;}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:4px;border:1px solid #ccc;}
.messenger{position:fixed;bottom:20px;right:20px;}
</style>

</head>
<body>

<header>
<img src="https://img.icons8.com/ios-filled/50/ffffff/q.png" alt="Q Logo">
eQro.sit
</header>

<nav>
<button onclick="showPage('pdf')">Q PDF Hub</button>
<button onclick="showPage('video')">EduVid</button>
<button onclick="showPage('shop')">Q Shop</button>
<button onclick="showPage('admin')">Admin</button>
</nav>

<div id="pdf" class="page"><h2>Q PDF Hub</h2><div id="pdfList" class="grid"></div></div>
<div id="video" class="page"><h2>EduVid</h2><div id="videoList" class="grid"></div></div>
<div id="shop" class="page"><h2>Q Shop</h2><div id="productList" class="grid"></div></div>

<div id="admin" class="page">
<h2>Admin Panel</h2>

<h3>Upload PDF</h3>
<input type="file" id="pdfFile">
<input type="text" id="pdfName" placeholder="PDF Name">
<select id="pdfCategory">
<option value="Academic">Academic</option>
<option value="Job">Job</option>
<option value="Admission">Admission</option>
<option value="Others">Others</option>
</select>
<button onclick="uploadPDF()">Upload PDF</button>

<h3>Upload Video</h3>
<input type="file" id="videoFile">
<input type="text" id="videoName" placeholder="Video Name">
<button onclick="uploadVideo()">Upload Video</button>

<h3>Add Product</h3>
<input type="file" id="productImage">
<input type="text" id="productName" placeholder="Product Name">
<input type="text" id="productPrice" placeholder="Price">
<button onclick="uploadProduct()">Add Product</button>
</div>

<div class="messenger">
<a href="https://m.me/EQro.sit" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Facebook_Messenger_4_Logo.svg" width="50">
</a>
</div>

<script>
// Page switcher
function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(page).style.display="block";
}

// Firebase Initialization
const firebaseConfig = {
  apiKey: "AIzaSyCnLfTANOVjLj46rE4-byCzEU7xfXP9uMM",
  authDomain: "eqrosit.firebaseapp.com",
  projectId: "eqrosit",
  storageBucket: "eqrosit.appspot.com",
  messagingSenderId: "485359786998",
  appId: "1:485359786998:web:6ea5bd9755ce48ea1f45d7",
  measurementId: "G-SXJWYR1YX1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const messengerID = "EQro.sit";

// Add Cards
function addPDFCard(name, category, url){
document.getElementById("pdfList").innerHTML += `<div class="card">
<h3>${name} (${category})</h3>
<button onclick="window.open('${url}','_blank')">
<img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-messenger.png">
Contact via Messenger
</button>
</div>`;
}

function addVideoCard(name, url){
document.getElementById("videoList").innerHTML += `<div class="card">
<h3>${name}</h3>
<video controls src="${url}"></video>
<button onclick="window.open('https://m.me/${messengerID}','_blank')">
<img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-messenger.png">
Contact via Messenger
</button>
</div>`;
}

function addProductCard(name, price, imageURL){
document.getElementById("productList").innerHTML += `<div class="card">
<img src="${imageURL}">
<h3>${name}</h3>
<p>Price: ${price}</p>
<button onclick="window.open('https://m.me/${messengerID}','_blank')">
<img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-messenger.png">
Contact via Messenger
</button>
</div>`;
}

// Upload functions
function uploadPDF(){
const file=document.getElementById("pdfFile").files[0];
const name=document.getElementById("pdfName").value;
const category=document.getElementById("pdfCategory").value;
if(file && name){
const storageRef=storage.ref('pdfs/'+file.name);
storageRef.put(file).then(()=>{
storageRef.getDownloadURL().then(url=>{
db.collection("pdfs").add({name, category, url}).then(()=>{
addPDFCard(name, category, url);
alert("PDF uploaded!");
});
});
});
}else alert("Select file and enter name!");
}

function uploadVideo(){
const file=document.getElementById("videoFile").files[0];
const name=document.getElementById("videoName").value;
if(file && name){
const storageRef=storage.ref('videos/'+file.name);
storageRef.put(file).then(()=>{
storageRef.getDownloadURL().then(url=>{
db.collection("videos").add({name, url}).then(()=>{
addVideoCard(name, url);
alert("Video uploaded!");
});
});
});
}else alert("Select file and enter name!");
}

function uploadProduct(){
const file=document.getElementById("productImage").files[0];
const name=document.getElementById("productName").value;
const price=document.getElementById("productPrice").value;
if(file && name && price){
const storageRef=storage.ref('products/'+file.name);
storageRef.put(file).then(()=>{
storageRef.getDownloadURL().then(url=>{
db.collection("products").add({name, price, url}).then(()=>{
addProductCard(name, price, url);
alert("Product uploaded!");
});
});
});
}else alert("Select file, name and price!");
}

// Load existing items on page load
db.collection("pdfs").get().then(snapshot=>{
snapshot.forEach(doc=>{
const data=doc.data();
addPDFCard(data.name,data.category,data.url);
});
});
db.collection("videos").get().then(snapshot=>{
snapshot.forEach(doc=>{
const data=doc.data();
addVideoCard(data.name,data.url);
});
});
db.collection("products").get().then(snapshot=>{
snapshot.forEach(doc=>{
const data=doc.data();
addProductCard(data.name,data.price,data.url);
});
});

// Default page
showPage('pdf');
</script>

</body>
</html>
